name: "Labels: Untriaged"

concurrency:
  group: labels
  cancel-in-progress: false
  queue: max

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  add_label:
    runs-on: ubuntu-latest
    steps:
    - name: Add untriaged label
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        label_count=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER/labels" --jq 'length')

        if [ "$label_count" -eq 0 ]; then
          gh api --method POST "repos/$REPO/issues/$ISSUE_NUMBER/labels" \
            --field labels[]="S: Untriaged"
        fi
