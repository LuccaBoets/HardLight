name: "Labels: Branch staging"

concurrency:
  group: labels
  cancel-in-progress: false
  queue: max

on:
  pull_request_target:
    types:
      - opened
    branches:
      - 'staging'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  add_label:
    runs-on: ubuntu-latest
    steps:
    - name: Add staging branch label
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        gh api --method POST "repos/$REPO/issues/$PR_NUMBER/labels" \
          --field labels[]="Branch: Staging"
