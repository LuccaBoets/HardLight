name: "Labels: Review"

concurrency:
  group: labels
  cancel-in-progress: false
  queue: max

on:
  pull_request_target:
    types: [review_requested]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  add_label:
    runs-on: ubuntu-latest
    steps:
    - name: Update review labels
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        gh api --method POST "repos/$REPO/issues/$PR_NUMBER/labels" \
          --field labels[]="S: Needs Review"

        gh api --method DELETE "repos/$REPO/issues/$PR_NUMBER/labels/S%3A%20Awaiting%20Changes" || true
