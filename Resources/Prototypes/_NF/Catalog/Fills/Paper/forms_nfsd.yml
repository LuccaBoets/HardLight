- type: entity # Based on form made by Starly (Shaw Clifflower)
  id: PaperWrittenNfsdAuthorization
  name: authorization for bluespace threats
  parent: Paper
#  categories: [ HideSpawnMenu ]
  components:
  - type: Paper
    content: |2 # When updating this, update PaperWrittenFrontierAuthorization
      [color=#40516e]◥[bold]CS[/bold]◣ [bold]ColSec[/bold][/color]
      [color=#40516e]‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾[/color]
      [head=2]Authorization for Bluespace Threats[/head]

      [bold]Vessel Captain:[/bold][form]
      [bold]Vessel IFF:[/bold][form]
      [bold]Shift Time:[/bold][form]

      [bold]Issuing Command:[/bold]
          [bullet][form], Station Captain
          [bullet][form], Head of Security

      This document authorizes the above vessel and its captain to assist and cooperate with ColSec and authorities in neutralizing hostile bluespace threats. These include, but are not limited to:
          [bullet] Cultist vessels
          [bullet] Syndicate vessels
          [bullet] Wizard Federation vessels
          [bullet] Arcadia Industries vessels

      This document does NOT deputize the authorized party. The authorized party is not granted special privileges to arrest, detain, and prosecute individuals associated with Nanotrasen.

      [bold]Any contraband seized during operations aboard hostile vessels must be surrendered, either to ColSec or the Station Captain, for a cash bounty. Failure to surrender contraband will lead to the forfeiture of this agreement, and the authorized party may be liable for criminal charges.[/bold]

      The authorized party is to keep a copy of this document for inspection. The authorized party is expected to maintain contact with ColSec command and/or the Station Captain to minimize casualties.

      Before engaging with hostile vessels, the authorized party is expected to follow any instructions given by ColSec for staging or other preparation prior to boarding.



      [color=#AAAAAA]This Form is void without the signatures of both Parties and a stamp of Command (Head of Security or Station Captain).[/color]
