# VRS: Ported from Triad_Sector — portstrike countdown announcements.
# Round-end timing rules (RoundEndRuleHour3 etc.) intentionally excluded — VRS does not force round restarts.

- type: entity
  id: PortstrikeAnnounceRuleHour4
  parent: BaseGameRule
  components:
  - type: GameRule
    delay:
      min: 14400
      max: 14400
  - type: BlankRule
  - type: StationEvent
    earliestStart: 0
    endAnnouncement: gamerule-portstrike-announce-announcement
    endAudio:
      path: /Audio/Misc/gamma.ogg
      params:
        volume: -2

- type: entity
  id: PortstrikeAnnounceRuleHour1
  parent: PortstrikeAnnounceRuleHour4
  components:
  - type: GameRule
    delay:
      min: 3600
      max: 3600

# debug rules
- type: entity
  id: PortstrikeAnnounceRuleSeconds20
  parent: PortstrikeAnnounceRuleHour4
  components:
  - type: GameRule
    delay:
      min: 20
      max: 20
