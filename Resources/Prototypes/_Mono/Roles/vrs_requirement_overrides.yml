# =============================================================================
# VRS Job Requirement Overrides — single source of truth for playtime gating
# =============================================================================
#
# How this works:
#   - This file defines a `jobRequirementOverride` prototype.
#   - When the CVar `game.role_timer_override` is set to this prototype's `id`
#     (here: `VRSDefault`), the `requirements:` block on each listed job's
#     YAML is REPLACED wholesale by the entries under `jobs:` below.
#   - Jobs NOT listed here fall back to their own in-file requirements.
#   - To disable all timers globally instead, set CVar `game.role_timers false`.
#
# To activate, add to server_config.toml:
#   [game]
#   role_timer_override = "VRSDefault"
#
# Requirement types available (from Content.Shared/Roles/JobRequirement/):
#   !type:OverallPlaytimeRequirement   time: <seconds>
#   !type:RoleTimeRequirement          role: <PlayTimeTrackerId>   time: <seconds>
#   !type:DepartmentTimeRequirement    department: <Dept>  time: <seconds>
#   !type:AgeRequirement               age: <years>
#   !type:SpeciesRequirement           species: [SpeciesId, ...]
#
# Time is in SECONDS. Quick reference:
#   1h = 3600   3h = 10800   5h = 18000   10h = 36000   20h = 72000   40h = 144000
#
# To override a job: uncomment its block and edit. To use vanilla requirements
# for a job: leave its block commented out (or delete it).
# =============================================================================

- type: jobRequirementOverride
  id: VRSDefault
  jobs:

    # ----- Command --------------------------------------------------------
    Captain:
    - !type:OverallPlaytimeRequirement
      time: 72000   # 20h total
    - !type:DepartmentTimeRequirement
      department: Command
      time: 18000   # 5h in any command role
    StationCaptain:
    - !type:OverallPlaytimeRequirement
      time: 36000   # 10h
