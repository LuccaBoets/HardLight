# Plastitanium: VRS already defines `Plastitanium` (material+stack) in
# _HL/Stacks/Materials/Sheets/metal.yml + _HL/Reagents/Materials/metals.yml,
# and `SheetPlastitanium`/`SheetPlastitanium1`/`SheetPlastitanium10` entities in
# _HL/Entities/Objects/Materials/Sheets/metal.yml. The Mono port's redefinition
# would collide on those IDs, so we keep the inherited HL versions. The maps
# in this PR reference SheetPlastitanium* by ID and the HL versions resolve.

