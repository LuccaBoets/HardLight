# Enriched uranium products

- type: material
  id: UraniumFissile
  stackEntity: SheetUraniumFissile1
  name: materials-uraniumfissile
  unit: materials-unit-sheet
  icon: { sprite: /Textures/_Mono/Objects/Materials/fissiles.rsi, state: uranium }
  color: "#8a8568"
  price: 250 # 25000/sheet

- type: entity
  parent: MaterialBase
  id: SheetUraniumFissile
  name: fissile uranium
  description: Ingots of pure, unadulterated weapons-grade uranium isotopes. Expect some trouble with this.
  suffix: Full
  components:
  - type: Sprite
    sprite: /Textures/_Mono/Objects/Materials/fissiles.rsi
    state: uranium_3
    layers:
    - state: uranium_3
      map: ["base"]
  - type: Tag
    tags:
    - Sheet
  - type: Item
    sprite: /Textures/_Mono/Objects/Materials/fissiles.rsi
    heldPrefix: fissile uranium
    inhandVisuals:
      left:
      - state: uranium-inhand-left
      right:
      - state: uranium-inhand-right
  - type: Stack
    stackType: UraniumFissile
    count: 5
    baseLayer: base
    layerStates:
    - uranium
    - uranium_2
    - uranium_3
  - type: Material
  - type: RadiationReceiver
  - type: RadiationSource
    intensity: 0.4
  - type: ChainRadiation
    baseIntensity: 0.4
    coefficient: 0.1 # critical mass at 25
    explosionThreshold: 10 # let it cook a bit
    totalIntensity: 15000
    intensitySlope: 2000
    maxIntensity: 4000
    explosionType: Radioactive # VRS: ChainRadiation owns the explosion prototype directly (ExplosiveComponent is locked).
  - type: Appearance
  - type: PhysicalComposition
    materialComposition:
      UraniumFissile: 100
  - type: Explosive
    explosionType: Radioactive
    totalIntensity: 20.0
    intensitySlope: 5
    maxIntensity: 4
  - type: ThermalSignature
  - type: PassiveThermalSignature
    signature: 1500000
  - type: PointLight
    color: "#8a8568"
    radius: 2
    energy: 1
  - type: DamageOnLand
    damage:
      types:
        Radiation: 5

- type: entity
  parent: SheetUraniumFissile
  id: SheetUraniumFissile1
  suffix: 1
  components:
  - type: Stack
    count: 1

