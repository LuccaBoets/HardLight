# VRS port: Mono — base tech-disk prototype and tier weights.
#
# This mirrors the upstream Mono TechDiskBase / TechDiskTierWeightsNormal
# definitions but uses VRS's existing TechnologyDisk framework and the
# shared TechDiskMono tag already present in _Mono/tags.yml.

- type: entity
  parent: BaseItem
  id: TechDiskBase
  name: tech disk
  suffix: DO NOT MAP
  description: A disk capable of adding a specific research to a server.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Specific/Research/researchdisk.rsi
    layers:
    - state: icon
      map: ["enum.DamageStateVisualLayers.Base"]
    - state: label
    - state: protect
    - state: holo
      shader: unshaded
  - type: Tag
    tags:
    - TechDiskMono

- type: weightedRandom
  id: TechDiskTierWeightsNormal
  weights:
    1: 1
    2: 1
    3: 1
