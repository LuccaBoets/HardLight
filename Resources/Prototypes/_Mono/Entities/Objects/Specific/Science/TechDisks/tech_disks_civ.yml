# VRS port: Mono — civilian tech disks.
#
# These are the small, dependency-light disks that only reference recipe
# ids already present in VRS. Heavier disks that depend on missing ship
# shield boards or other still-unported recipes stay deferred.

- type: entity
  parent: TechDiskBase
  id: TechDiskCivBluespaceBags
  name: civilian bluespace storage tech disk
  description: A disk capable of adding basic bluespace storage to a server's recipes.
  components:
  - type: Sprite
    layers:
    - state: icon
      map: ["enum.DamageStateVisualLayers.Base"]
      color: "#395933"
    - state: label
    - state: protect
    - state: civilian
  - type: TechnologyDisk
    recipes:
    - OreBagOfHolding
    - PlantBagOfHolding
    - FireExtinguisherBluespace

