# Mono borg modules used by remnant borg roles.

- type: entity
  id: BorgModuleRedactedRCD
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: pre-fracture RCD module
  components:
  - type: Sprite
    layers:
    - state: syndicate
    - state: icon-rcd
  - type: ItemBorgModule
    moduleId: RCD
    items:
    - RCDRecharging
    - ShipRepairDeviceRedacted
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: rcd-module }

- type: entity
  id: BorgModuleRedactedWeapon
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: pre-fracture weapon cyborg module
  components:
  - type: Sprite
    sprite: _Mono/Objects/Specific/Robotics/borgmodule.rsi
    layers:
    - state: mercenary
    - state: icon-mercenary
  - type: ItemBorgModule
    moduleId: Security
    items:
    - WeaponPistolAnaconda
    - WeaponRifleAk
  - type: BorgModuleIcon
    icon: { sprite: _Mono/Interface/Action/actions_borg.rsi, state: mercenary-weapon-module }
