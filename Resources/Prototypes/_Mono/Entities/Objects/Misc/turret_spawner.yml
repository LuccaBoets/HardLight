# Mono port: trimmed for VRS — only SpawnMobWeaponTurretLaserSilicon (referenced
# by event maps). All other faction-flavour spawners (TSFMC/USSP/PDV) removed
# because their underlying turret entities (WeaponTurretLaserTSFMC,
# WeaponTurretTSFMC, WeaponTurretUSSP, WeaponTurretPDV) are not yet ported in
# VRS. The Silicon turret spawner stubs to the existing VRS WeaponTurretLaser
# Syndicate variant until the Mono silicon-laser turret is ported.

- type: entity
  id: SpawnMobWeaponTurretLaserSilicon
  parent: MarkerBase
  name: silicon laser turret spawner
  suffix: Silicon, Frontier
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: _NF/Objects/Weapons/Guns/Turrets/laser.rsi
      state: base
  - type: ConditionalSpawner
    prototypes:
    # VRS: Mono's WeaponTurretLaserSilicon not ported; substitute with the
    # equivalent VRS hostile-laser turret to keep the spawner functional.
    - WeaponTurretLaserSyndicateNF
