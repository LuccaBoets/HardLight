# VRS port: Mono — silicon lawsets for civilian / faction AI cores.
#
# Subset of Triad's _Mono/Entities/Mobs/Player/silicon-laws.yml. The
# "Redacted" ADS lawset is deferred because it depends on the
# law-ads-* locale strings owned by the hostile-shuttle events
# subsystem (PR #33). Once that locale block is also ported, a
# follow-up PR can re-introduce the Redacted / RedactedBorg lawsets.
#
# All lawsets here reuse the upstream siliconLaw / siliconLawset
# prototypes and the existing laws-owner-crew obeysTo string.

# Vessel lawset
- type: siliconLaw
  id: Vessel0
  order: 0
  lawString: law-vessel-0

- type: siliconLaw
  id: Vessel1
  order: 1
  lawString: law-vessel-1

- type: siliconLaw
  id: Vessel2
  order: 2
  lawString: law-vessel-2

- type: siliconLaw
  id: Vessel3
  order: 3
  lawString: law-vessel-3

- type: siliconLawset
  id: VesselLawset
  laws:
  - Vessel0
  - Vessel1
  - Vessel2
  - Vessel3
  obeysTo: laws-owner-crew

