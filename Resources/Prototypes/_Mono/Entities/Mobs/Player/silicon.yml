- type: entity
  id: AiHeldMono
  description: Components added / removed from an entity that gets inserted into an AI core.
  categories: [ HideSpawnMenu ]
  abstract: true
  components:
  - type: IntrinsicRadioReceiver
  - type: IgnoreUIRange
  - type: StationAiHeld
  - type: StationAiOverlay
  - type: ShowElectrocutionHUD
  - type: ActionGrant
    actions:
    - ActionJumpToCore
    - ActionSurvCameraLights
    - ActionAIViewLaws
    - ActionOpenRemoteDevicesMenu
  - type: UserInterface
    interfaces:
      enum.RadarConsoleUiKey.Key:
        type: RadarConsoleBoundUserInterface
      enum.SiliconLawsUiKey.Key:
        type: SiliconLawBoundUserInterface
      enum.RemoteDeviceUiKey.Key:
        type: RemoteDevicesBoundUserInterface
  - type: IntrinsicUI
    uis:
      enum.RadarConsoleUiKey.Key:
        toggleAction: ActionAGhostShowRadar
  - type: RadarConsole
    followEntity: false
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: CrewMonitor
    transmitFrequencyId: ShuttleTimer
  - type: HolographicAvatar
    layerData:
    - sprite: Mobs/Silicon/station_ai.rsi
      state: default
  - type: ShowJobIcons
  - type: AdvancedPilot

- type: entity
  id: BaseBorgChassisRedacted
  parent: BaseBorgChassis
  abstract: true
  components:
  - type: NpcFactionMember
    factions:
    - Syndicate
    - SiliconsExpeditionNF
  - type: Access
    tags:
    - NuclearOperative
    - SyndicateAgent
  - type: AccessReader
    access: [["SyndicateAgent"], ["NuclearOperative"]]
  - type: IntrinsicRadioTransmitter
    channels:
    - Common
    - Remnants
    - Traffic
  - type: ActiveRadio
    channels:
    - Common
    - Remnants
    - Traffic
  - type: CollectiveMind
    channels:
    - Binary
    defaultChannel: Binary
  - type: ShowSyndicateIcons
  - type: MovementAlwaysTouching
  - type: Speech
    speechSounds: SyndieBorg
    allowedEmotes:
    - Laugh
  - type: Vocal
    sounds:
      Unsexed: UnisexSiliconSyndicate
  - type: IonStormTarget
    chance: 0.2
  - type: ShowJobIcons
  - type: SiliconLawProvider
    laws: RedactedBorg

- type: entity
  id: BorgChassisRedacted
  parent: BaseBorgChassisRedacted
  name: remnant automated defense system tender
  description: A tender to a automated drone ship, to keep internal mechanisms intact.
  components:
  - type: BorgChassis
    maxModules: 10
    moduleWhitelist:
      tags:
      - BorgModuleGeneric
      - BorgModuleEngineering
      - BorgModuleSyndicate
      - BorgModuleSyndicateAssault
    hasMindState: derelict_e
    noMindState: derelict_e_r
  - type: Construction
    node: derelictcyborg
  - type: InteractionPopup
    interactSuccessString: petting-success-derelict-cyborg
    interactFailureString: petting-failure-derelict-cyborg
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: ExplosionResistance
    damageCoefficient: 0.4
  - type: Scrammer
    actionProto: ActionScrammerScramADM
    specifier:
      teleportRadius: 40
      teleportAttempts: 5
      forceSafe: false
      minRadiusFraction: 0.75
  - type: MobThresholds
    thresholds:
      0: Alive
      180: Critical
      250: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      140: 0.7
      160: 0.5
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Machines/warning_buzzer.ogg
          params:
            volume: 5
    - trigger:
        !type:DamageTrigger
        damage: 350
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:EmptyContainersBehaviour
        containers:
        - borg_brain
        - borg_module
        - cell_slot
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  id: PlayerBorgRedacted
  parent: BorgChassisRedacted
  suffix: Battery, Module
  components:
  - type: ContainerFill
    containers:
      borg_brain:
      - PositronicBrain
      borg_module:
      - BorgModuleOperative
      - BorgModuleRedactedWeapon
      - BorgModuleEsword
      - BorgModuleJetpack
      - BorgModuleAdvancedTool
      - BorgModuleConstruction
      - BorgModuleCable
      - BorgModuleRedactedRCD
      - BorgModuleGPS
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellAntiqueProto

- type: entity
  id: PlayerBorgRedactedGhostRole
  parent: PlayerBorgRedacted
  suffix: Ghost
  components:
  - type: GhostRole
    name: ghost-role-information-redacted-borg
    description: ghost-role-information-redacted-borg-description
    rules: ghost-role-information-silicon-rules
    raffle:
      settings: default
    prototype: RedactedBorg
  - type: GhostTakeoverAvailable

- type: entity
  id: PlayerBorgRedactedGhostRolePlaytime
  parent: PlayerBorgRedacted
  suffix: Ghost, Playtime
  components:
  - type: GhostRole
    name: ghost-role-information-redacted-borg
    description: ghost-role-information-redacted-borg-description
    rules: ghost-role-information-silicon-rules
    raffle:
      settings: default
    requirements:
    - !type:OverallPlaytimeRequirement
      time: 180000
  - type: GhostTakeoverAvailable

- type: entity
  id: PlayerStationAiRedacted
  parent: PlayerStationAiEmpty
  suffix: Ghost Role, Remnant
  components:
  - type: ContainerComp
    proto: AiHeldRedacted
    container: station_ai_mind_slot
  - type: ContainerFill
    containers:
      station_ai_mind_slot:
      - StationAiBrainRedacted
  - type: Sprite
    sprite: Mobs/Silicon/station_ai.rsi
    layers:
    - state: base
    - state: ai
      shader: unshaded
  - type: Anchorable

- type: entity
  id: StationAiBrainRedacted
  parent: StationAiBrain
  categories: [ HideSpawnMenu, DoNotMap ]
  components:
  - type: Sprite
  - type: SiliconLawProvider
    laws: Redacted
  - type: GhostRole
    name: ghost-role-information-redacted-core
    description: ghost-role-information-redacted-core-description
    rules: ghost-role-information-silicon-rules
    raffle:
      settings: default
    prototype: RemnantAICore
  - type: Access
    groups:
    - AllAccess
    tags:
    - NuclearOperative
    - SyndicateAgent
  - type: GhostTakeoverAvailable
  - type: ShuttleBoostingPilot
    angularMultiplier: 1.5
    accelerationMultiplier: 1.5

- type: entity
  id: AiHeldRedacted
  parent: AiHeldMono
  categories: [ HideSpawnMenu ]
  components:
  - type: IntrinsicRadioTransmitter
    channels:
    - Common
    - Remnants
    - Traffic
  - type: ActiveRadio
    channels:
    - Common
    - Remnants
    - Traffic
  - type: CollectiveMind
    channels:
    - Binary
    defaultChannel: Binary
