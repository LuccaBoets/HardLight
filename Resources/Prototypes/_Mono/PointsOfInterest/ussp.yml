# VRS: Ported from Triad_Sector — Camelot USSP Station POI.

- type: pointOfInterest
  id: USSPCamelot
  parent: [BasePOI, BaseRepairablePOI]
  name: 'Camelot Station'
  minimumDistance: 10650
  maximumDistance: 12400
  spawnGamePreset: [ NFAdventure, NFPirate ]
  spawnGroup: Required
  gridPath: /Maps/_Mono/POI/camelot.yml
  addComponents:
  - type: IFF
    color: "#ccaa55"

- type: gameMap
  id: USSPCamelot
  mapName: 'Camelot Station'
  mapPath: /Maps/_Mono/POI/camelot.yml
  minPlayers: 0
  stations:
    USSPCamelot:
      stationProto: RecordsFrontierOutpostCargo
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Camelot Station'
        - type: StationJobs
          availableJobs:
            Contractor: [-1, -1]
            Pilot: [0, -1]
            Mercenary: [0, -1]
          tags:
          - USSPCommand
        - type: StationDeadDrop
          maxDeadDrops: 2
