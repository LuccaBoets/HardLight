# VRS: Ported from Triad_Sector — Dungeon POI prototypes.
# These are harder-content dungeon locations with hidden IFF labels.

- type: pointOfInterest
  id: Lancelot
  parent: BasePOI
  name: 'Lancelot Mining Outpost'
  minimumDistance: 10000
  maximumDistance: 15000
  spawnGamePreset: [ NFAdventure, NFPirate ]
  spawnGroup: Optional
  gridPath: /Maps/_Mono/POI/Dungeons/lancelot.yml
  addComponents:
  - type: IFF
    color: "#ccaa55"
    flags: [HideLabel]
    readOnly: true
  - type: SolarPoweredGrid
    trackOnInit: true
    doNotCull: true

- type: gameMap
  id: Lancelot
  mapName: 'Lancelot Mining Outpost'
  mapPath: /Maps/_Mono/POI/Dungeons/lancelot.yml
  minPlayers: 0
  stations:
    Lancelot:
      stationProto: RecordsFrontierOutpostCargo
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Lancelot Mining Outpost'
        - type: StationDeadDropHintExempt

