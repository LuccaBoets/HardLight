#
# Per-department SOP guidebook entries. Hooked into the existing "SOP" root entry in
# Resources/Prototypes/Guidebook/station.yml via a `children:` extension.
#
# Each entry points at a stub XML under ServerInfo/_VRS/Guidebook/SoP/Departments/.
# Authors: edit those XML files freely - drafts stay invisible to players because
# the voidrift.sop.<dept>_enabled cvars default to false, so the corresponding
# books are never spawned at round start until you flip the cvar.

- type: guideEntry
  id: SopCommand
  name: Command SOP
  text: "/ServerInfo/_VRS/Guidebook/SoP/Departments/CommandSOP.xml"

- type: guideEntry
