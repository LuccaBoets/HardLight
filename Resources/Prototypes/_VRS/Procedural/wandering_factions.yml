# VRS: ambient wandering mob packs that populate persistent biome planets.
# Each layer uses Poisson-disc placement with `radius` minimum spacing and a
# huge `size` (marker chunk) so packs stay sparse and rarely cluster. Group
# sizes are intentionally small — these are *encounters*, not raids.

- type: biomeMarkerLayer
  id: VRSWanderingXenos
  prototype: MobXeno
  radius: 600
  size: 256
  maxCount: 6
  minGroupSize: 2
  maxGroupSize: 3

- type: biomeMarkerLayer
  id: VRSWanderingXenoDrones
  prototype: MobXenoDroneNPC
  radius: 600
  size: 256
  maxCount: 6
  minGroupSize: 2
  maxGroupSize: 4

