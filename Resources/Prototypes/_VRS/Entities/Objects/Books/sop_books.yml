#
# Per-department Standard Operating Procedure books.
# These are auto-issued at spawn by Content.Server._VRS.Sop.SopIssuerSystem when the
# matching voidrift.sop.<dept>_enabled cvar is true. Each department ships in two flavours:
#
#   BookSop<Dept>          - guidebook-backed, opens the in-game F1 Guidebook to Sop<Dept>.
#   BookSop<Dept>Hyperlink - hyperlink-backed, opens an external wiki URL via HyperlinkBook.
#
# Both carry the BookSop tag so they fit the PDA's sopSlot (whitelisted in pda.yml).
# The issuer spawns the guidebook variant by default; admins can swap any department to the
# hyperlink variant by editing the issuer's prototype map.

# ---------- Guidebook-backed variants ----------

- type: entity
  id: BookSopCommand
  parent: BaseGuidebook
  name: command SOP
  description: Standard Operating Procedure for the Command department.
  components:
  - type: Sprite
    layers:
    - state: paper
    - state: cover_base
      color: "#334E6D"
    - state: decor_wingette
      color: "#5a7da6"
    - state: icon_corner
      color: gold
  - type: GuideHelp
    guides:
    - SopCommand
  - type: Tag
    tags:
    - Book
    - BookSop

