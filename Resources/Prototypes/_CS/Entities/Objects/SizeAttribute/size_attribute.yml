# Size effects, Scale should go to 0.25 to 2.5 (even 5.0), exterme scales should be not meta
# Scale changes in steps of 0.15, starting from one
# Minscale < Scale (of the entity) <= max

- type: sizeManipulation
  id: Normal
  minScale: 0.84 # Gave wider range
  maxScale: 1.15 

- type: sizeManipulation
  id: Big
  minScale: 1.15
  maxScale: 1.45
  components:
  - type: CritThresholdModifier
    critThresholdDelta: 25
  - type: GunAccuracyModifier
    spreadMultiplier: 1.25
  - type: MeleeDamageModifier
    flatBonus: 2
    damageType: Blunt
  - type: ThrowStrengthModifier
    multiplier: 1.35
  - type: TraitZoomModifier
    multiplier: 1.15
  - type: TraitMovementSpeedModifier
    walkMultiplier: 0.7
    sprintMultiplier: 0.75
  - type: TraitCyborgPowerDrawModifier
    multiplier: 3
  - type: CrawlUnderObjects
    sneakSpeedModifier: 0.55
    squeezeRadiusScale: 0.75
    unsqueezedRadiusScale: 1.05

