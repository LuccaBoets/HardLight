- type: entity
  id: AltarManawaRite
  parent: BaseLathe
  name: Manawa Rite altar
  description: A sacred altar of the Manawa Rite.
  components:
  - type: Sprite
    sprite: _HL/Factions/ManawaRite/Structures/Furniture/Altars/manawa_rite_altar.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
  - type: Icon
    sprite: _HL/Factions/ManawaRite/Structures/Furniture/Altars/manawa_rite_altar.rsi
    state: icon
  - type: PointLight
    radius: 1.5
    energy: 0.1
    color: "#00e8c8"
  - type: Prayable
  - type: ApcPowerReceiver
    powerLoad: 0
  - type: Machine
    board: ManaCore
  - type: Lathe
    idleState: icon
    runningState: icon
    timeMultiplier: 0.5
    staticPacks:
    - ManawaRiteStatic
  - type: MaterialStorage
    canEjectStoredMaterials: true
  - type: OreSiloClient
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
