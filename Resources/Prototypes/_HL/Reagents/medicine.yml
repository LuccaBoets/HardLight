- type: reagent
  id: Painkillers
  name: reagent-name-painkillers
  group: Medicine
  desc: reagent-desc-painkillers
  physicalDesc: reagent-physical-desc-sweet
  flavor: sweet
  color: "#ffc0cb"
  metabolisms:
    Medicine:
      metabolismRate : 0.02
      effects:
      - !type:PopupMessage
        type: Local
        visualType: Medium
        messages:
          - "reagent-effect-painkiller-strong1"
          - "reagent-effect-painkiller-strong4"
          - "reagent-effect-painkiller-strong5"
          - "reagent-effect-painkiller-strong6"
        probability: 0.2
      - !type:PopupMessage
        type: Local
        visualType: Small
        messages:
          - "reagent-effect-painkiller-fade"
        probability: 0.7
        conditions:
          - !type:ReagentThreshold
            max: 0.2
      - !type:Painkillers
      - !type:Painkillers
        type: Remove
        conditions:
          - !type:ReagentThreshold
            max: 0.2

# Addictine curing chem
- type: reagent
  id: Efflumetonial
  name: reagent-name-efflumetonial
  group: Medicine
  desc: reagent-desc-efflumetonial
  physicalDesc: reagent-physical-desc-clear
  flavor: bitter
  color: "#a0c8ff"
  recognizable: false
  spoilConditions:
    spoilsInto: Ethyloxyephedrine
    bloodstreamPreserve: true
    preservedBySpoilageContainers: false
  metabolisms:
    Medicine:
      metabolismRate: 1
      effects:
      - !type:AdjustReagent
        reagent: Addictine
        amount: -0.5
      - !type:Jitter
      # Low amount effects
      - !type:PopupMessage
        type: Local
        visualType: Medium
        messages:
          - "efflumetonial-effects-low-1"
          - "efflumetonial-effects-low-2"
          - "efflumetonial-effects-low-3"
          - "efflumetonial-effects-low-4"
        probability: 0.1
        conditions:
        - !type:ReagentThreshold
          max: 9
        - !type:ReagentThreshold
          reagent: Addictine
          min: 0.1
      # Medium amount effects
      - !type:PopupMessage
        type: Local
        visualType: Medium
        messages:
          - "efflumetonial-effects-high-1"
          - "efflumetonial-effects-high-2"
          - "efflumetonial-effects-high-3"
          - "efflumetonial-effects-high-4"
          - "efflumetonial-effects-high-5"
        probability: 0.1
        conditions:
        - !type:ReagentThreshold
          min: 10
          max: 15
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
        conditions:
        - !type:ReagentThreshold
          min: 10
        - !type:ReagentThreshold
          reagent: Addictine
          min: 0.1
      # Overdose effects
      - !type:PopupMessage
        type: Local
        visualType: LargeCaution
        messages:
          - "efflumetonial-effects-overdose-1"
          - "efflumetonial-effects-overdose-2"
          - "efflumetonial-effects-overdose-3"
          - "efflumetonial-effects-overdose-4"
          - "efflumetonial-effects-overdose-5"
          - "efflumetonial-effects-overdose-6"
        probability: 0.1
        conditions:
        - !type:ReagentThreshold
          min: 15
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 15
        probability: 0.33
        damage:
          types:
            Asphyxiation: 25
      - !type:AdjustTemperature
        conditions:
        - !type:ReagentThreshold
          min: 15
        amount: -26250
