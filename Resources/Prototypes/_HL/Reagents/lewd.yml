# HardLight - "sexual lubricant" (precum / pussy juice).
- type: reagent
  id: NaturalLubricant
  name: reagent-name-sexual-lubricant
  group: NaturalSauce
  desc: reagent-desc-sexual-lubricant
  physicalDesc: reagent-physical-desc-slimy
  flavor: salty
  color: "#dbe7f0d0"
  viscosity: 0.1
  evaporationSpeed: 0.5
  recognizable: true
  metabolisms:
    Drink:
      effects:
      # Slight hydration, and only if the drinker consented to interacting with it.
      - !type:SatiateThirst
        factor: 0.2
        conditions:
        - !type:ConsentCondition
          consent: NaturalLubricant

- type: reagent
  id: Breast-Milk
  name: reagent-name-breast-milk
  group: Drinks
  desc: reagent-desc-breast-milk
  physicalDesc: reagent-physical-desc-opaque
  flavor: breast-milk
  color: "#dddcce"
  recognizable: true
  plantMetabolism:
    - !type:PlantAdjustNutrition
      amount: 0.1
    - !type:PlantAdjustWater
      amount: 0.9
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 4
      - !type:SatiateHunger
        factor: .5
