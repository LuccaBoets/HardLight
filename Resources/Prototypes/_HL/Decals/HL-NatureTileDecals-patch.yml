# Patch versions of nature tile decals for custom transition respriting.
# Edit the PNGs in Textures/_HL/Decals/tile-patch.rsi/ to soften tile edges.

# --- Desert / Sand ---
- type: decal
  id: TileDesert-patch
  tags: ["flora", "station", "markings"]
  snapCardinals: false
  defaultSnap: false
  sprite:
    sprite: /Textures/_HL/Decals/tile-patch.rsi
    state: desert

- type: decal
  id: TileLowDesert-patch
  tags: ["flora", "station", "markings"]
  snapCardinals: false
  defaultSnap: false
