# ---------- Collidable base (anchored, grid-placed) ----------

- type: entity
  id: NatureEnvironmentCollidableBase
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
  - type: Clickable
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static

# ---------- Tree ----------

- type: entity
  parent: NatureEnvironmentCollidableBase
  id: TreeDeco
  name: tree
  description: A tree from the forest.
  components:
  - type: Construction
    graph: NatureEnvironmentGraph
    node: TreeDeco
  - type: Sprite
    noRot: true
    sprite: Objects/Decoration/Flora/flora_trees.rsi
    drawdepth: Overdoors
    offset: 0,0.9
    layers:
    - state: tree01
      map: ["random"]
  - type: RandomSprite
    available:
    - random:
        tree01: ""
        tree02: ""
        tree03: ""
        tree04: ""
        tree05: ""
        tree06: ""
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.35,-0.4,0.35,0.4"
        density: 1000
        layer:
        - WallLayer
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

