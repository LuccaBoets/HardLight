- type: entity
  parent: BaseItemHarmless
  id: TripleTriadBase
  abstract: true
  components:
    - type: ItemToggle
      predictable: false
    - type: Appearance
    - type: GenericVisualizer
      visuals:
        enum.ToggleVisuals.Toggled:
         red:
            True: { visible: true }
            False: { visible: false }
         blue:
            True: { visible: false }
            False: { visible: true }

