- type: entity
  parent: BasePlushie
  id: PlushieSgaeyl
  name: Sgaeyl Plushie
  description: An elegant and beloved scientist of the Hardlight Sector, now in short (er) and marketable form. Eminates an unmistakable aura of bird rage.
  components:
  - type: Sprite
    sprite: _HL/Objects/Fun/patreon_plushies.rsi
    state: SgaeylUpdated
    scale: 0.8, 0.8
  - type: Clothing
    quickEquip: false
    sprite: _HL/Objects/Fun/patreon_plushies.rsi
    equippedPrefix: PlushSgaeyl
    slots:
    - HEAD
  - type: EmitSoundOnUse
    sound:
      path: /Audio/_Starlight/Voice/Resomi/resomi_squawk_1.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Starlight/Voice/Resomi/resomi_scree_1.ogg
  - type: EmitSoundOnActivate
    sound:
      path: /Audio/_Starlight/Voice/Resomi/resomi_squawk_1.ogg
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/_Starlight/Voice/Resomi/resomi_squawk_1.ogg
  - type: EmitSoundOnCollide
    sound:
      path: /Audio/_Starlight/Voice/Resomi/resomi_cry_2.ogg
  - type: MeleeWeapon
    wideAnimationRotation: 180
    soundHit:
      path: /Audio/_Starlight/Voice/Resomi/resomi_cry_2.ogg

