- type: entity
  parent: BasePlushie
  id: PlushieKabuki
  name: Vesca Plushie
  description: An adorable plushie resembling a blue Avali in a light blue flower kimono. Its dark blue eyes and anxious little expression make it feel like it is watching once you look away. It seems shy. Somehow.
  components:
  - type: SolutionContainerManager
    solutions:
      internals:
        maxVol: 10
  - type: InjectableSolution
    solution: internals
  - type: Sprite
    sprite: _HL/Objects/Fun/patreon_plushies.rsi
    state: VescaPlush
    scale: 0.8, 0.8
  - type: EmitSoundOnUse
