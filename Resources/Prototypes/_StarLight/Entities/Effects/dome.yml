- type: entity
  id: EnergyDomeNullspace
  categories: [ HideSpawnMenu ]
  parent: EnergyDomeBase
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 6.2
        density: 0
        hard: false
        mask:
        - None
        layer:
        - MidImpassable
  - type: Sprite
    drawdepth: WallTops
    sprite: Effects/EnergyDome/energydome_big.rsi
    scale: 2.5, 2.5
    layers:
    - state: big
      color: "#6c15ae"
      shader: unshaded
  - type: NullSpaceBlocker
    bypassPVS: true
    unphaseOnCollide: false
  - type: Visibility
    layer: 32
  - type: AmbientSound
    enabled: false

- type: entity
  id: EnergyDomeNullEnforcer
  categories: [ HideSpawnMenu ]
  parent: EnergyDomeBase
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 0
        mask:
        - None
        layer:
        - MidImpassable
  - type: Sprite
    drawdepth: Effects
    sprite: _HL/Effects/nullenforcer.rsi
    layers:
    - state: shield
      color: "#6c15ae"
      shader: unshaded
  - type: NullSpaceBlocker
    bypassPVS: true
    unphaseOnCollide: false
    collideOnlyNullSpace: true
  - type: Visibility
    layer: 32
  - type: AmbientSound
    enabled: false
